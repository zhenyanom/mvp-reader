<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVP Novel Reader - RPG Binder Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        /* 1. CONFIG & TEMA BINDER RPG */
        :root {
            /* Warna Kertas Krem Tanda Buku Tua */
            --paper-color: #fffdf5; 
            /* Warna Jilidan Binder Cokelat Tua */
            --binder-spine: #5d4037; 
            /* Warna Teks Novel */
            --text-color: #3e2723; 
            /* Warna Judul Header */
            --header-text: #fff;
            /* Tinggi Baris (Harus sama dengan background-size garis) */
            --line-height: 1.8em; 
        }

        body {
            margin: 0;
            padding: 0;
            /* Warna di luar binder (Cokelat gelap) */
            background-color: #3e2723; 
            font-family: 'Courier New', Courier, monospace; /* Font mesin ketik ala laporan */
            overflow-x: hidden;
            /* 🛡️ PERTAHANAN ANTI-COPAS MUTLAK */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            /* Anti Context Menu */
            -webkit-user-drag: none;
        }

        /* 2. RANGKA BINDER */
        #main-content {
            background: var(--paper-color);
            /* EFEK KERTAS BERGARIS (LINED PAPER) */
            background-image: linear-gradient(rgba(178, 177, 172, 0.4) .1em, transparent .1em);
            background-size: 100% var(--line-height);

            min-height: 100vh;
            max-width: 800px;
            margin: 20px auto; /* Memberi jarak dari tepi layar */
            position: relative;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.6);
            border-radius: 8px;
            
            /* EFEK JILIDAN BINDER DI SISI KIRI */
            border-left: 20px solid var(--binder-spine);
            overflow: hidden; /* Untuk menjaga header tetap di dalam border radius */
        }

        /* 3. HEADER JUDUL NOVEL (Cocok dengan Spine) */
        #header {
            background-color: var(--binder-spine);
            color: var(--header-text);
            padding: 15px;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid rgba(0,0,0,0.2);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 4. AREA TEKS NOVEL (MENEMPEL DI GARIS) */
        #content-area {
            /* padding bawah ekstra untuk Chibi & Watermark fixed */
            padding: 10px 25px 150px 25px; 
            color: var(--text-color);
            font-size: 1.1em;
        }

        /* Styling Paragraf agar menempel pas di atas garis background */
        #content-area p {
            margin: 0 0 var(--line-height) 0; /* Margin bawah sama dengan line-height */
            line-height: var(--line-height);
            text-align: justify;
            text-indent: 30px;
        }
        
        #content-area strong {
            font-weight: bold;
            color: #000;
        }
        #content-area em {
            font-style: italic;
            color: #555;
        }

        /* 5. BONUS: CHIBI ZHENYA & TAEKJOO FOOTER (Milik Master) */
        #chibi-footer {
            width: 100%;
            text-align: center;
            margin-top: 50px;
            padding-bottom: 20px;
            opacity: 0.9;
        }
        #chibi-footer img {
            max-width: 80%; /* Tidak terlalu penuh */
            height: auto;
            border-radius: 5px;
            /* Tidak bisa interaksi agar anti maling */
            pointer-events: none; 
            -webkit-user-drag: none;
        }

        /* 6. LAYAR SATPAM / ERROR SCREEN (Anti PC) */
        #error-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #aa0000;
            color: #ffffff;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 99999;
            padding: 20px;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* 7. WATERMARK (DISESUAIKAN UNTUK KERTAS KREM) */
        #watermark {
            position: fixed;
            bottom: 20px;
            left: 30px; /* Sedikit geser ke kanan dari spine */
            text-align: left;
            font-weight: bold;
            font-size: 13px;
            line-height: 1.3;
            white-space: pre-wrap;
            /* Warna Watermark HITAM SAMAR (Tidak Putih lagi) */
            color: rgba(0, 0, 0, 0.08); 
            text-shadow: none; /* Shadow dimatikan agar tidak kotor di kertas krem */
            pointer-events: none;
            z-index: 9999;
            font-family: sans-serif;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="error-screen">
        <h1>🛑 AKSES DITOLAK</h1>
        <p id="error-text">Novel ini HANYA BISA DIBACA melalui Aplikasi Telegram Resmi di Smartphone.</p>
    </div>

    <div id="main-content">
        <div id="header"><span id="novel-title">Memuat Judul...</span></div>
        <div id="watermark"></div>
        <div id="content-area">
            <p id="loading" style="text-align:center; color:#888; margin-top: 50px;">
                ⏳ Sedang membongkar lembaran novel...
            </p>
        </div>
        
        <div id="chibi-footer">
            <img src="chibi.jpg" alt="MVP Chibi Zhenya Taekjoo" onerror="this.style.display='none'">
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. Deteksi Platform & Parameter URL
        const platform = tg.platform || 'unknown';
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Logika Satpam (Blokir PC / Web Browser Biasa)
        const allowedPlatforms = ['android', 'android_x', 'ios'];
        if (!allowedPlatforms.includes(platform)) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            throw new Error("Akses PC Ditolak.");
        }

        // 3. SET JUDUL NOVEL
        if(urlParams.has('title')) {
            document.getElementById('novel-title').textContent = urlParams.get('title').replace(/_/g, ' ').toUpperCase();
        }

        // 4. GENERATE WATERMARK ADAPTIF (Format Sama Persis dengan Comic)
        const user = tg.initDataUnsafe?.user;
        const usn = user?.username ? `@${user.username}` : (user?.first_name || 'NoName');
        const userId = user?.id || 'UnknownID';
        const watermarkText = `👑 MVP\n${usn} (${userId})\nFree | DO NOT REPOST`;
        document.getElementById('watermark').innerText = watermarkText;

        // 5. RENDER TEKS NOVEL DARI BOT (.docx & .txt)
        async function loadNovelText() {
            const contentArea = document.getElementById('content-area');
            const loadingText = document.getElementById('loading');
            
            let txtUrls = [];
            let i = 0;
            while(urlParams.has('txt' + i)) {
                txtUrls.push(urlParams.get('txt' + i));
                i++;
            }

            if (txtUrls.length === 0) {
                loadingText.innerHTML = "⚠️ Halaman kosong. Tidak ada file yang ditemukan.<br><br>Pastikan kamu meng-upload file <b>.txt</b> atau <b>.docx</b>.";
                return;
            }

            let finalHtml = "";

            for(let url of txtUrls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        // JIKA FORMAT FILE ADALAH DOCX
                        if (url.toLowerCase().includes('.docx')) {
                            let arrayBuffer = await response.arrayBuffer();
                            // Konversi Mammoth
                            let result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer});
                            finalHtml += result.value;
                        } 
                        // JIKA FORMAT FILE ADALAH TXT
                        else {
                            let text = await response.text();
                            let safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            
                            // Eksekusi Bintang menjadi Bold dan Italic
                            safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                            safeText = safeText.replace(/\*(.*?)\*/g, '<em>$1</em>');

                            let paragraphs = safeText.split('\n');
                            paragraphs.forEach(para => {
                                let trimmed = para.trim();
                                if (trimmed.length > 0) {
                                    finalHtml += `<p>${trimmed}</p>`;
                                }
                            });
                        }
                    } else {
                        loadingText.innerHTML = `⚠️ Gagal mengunduh file dari Telegram.<br>Error Kode: ${response.status}`;
                        return;
                    }
                } catch (e) {
                    loadingText.innerHTML = `⚠️ Terjadi kesalahan saat membongkar file:<br>${e.message}`;
                    console.error("Gagal memuat teks:", e);
                    return;
                }
            }

            // Tampilkan Teks dan Hilangkan Tulisan Loading
            loadingText.style.display = 'none';
            contentArea.innerHTML += finalHtml;
        }

        loadNovelText();
    </script>
</body>
</html>
