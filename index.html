<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden; /* Mencegah web bisa digeser ke samping */
        }

        .comic-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative; /* Penting untuk posisi watermark */
        }

        .comic-panel {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* --- GAYA UNTUK WATERMARK --- */
        #watermark-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Jari pembaca tetap tembus ke gambar */
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            overflow: hidden;
            opacity: 0.15; /* Transparansi teks, agar tidak terlalu mengganggu bacaan */
        }

        .wm-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin: 40px;
            transform: rotate(-30deg); /* Teks dibuat miring */
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="comic-container" id="reader">
        <img class="comic-panel" src="LINK_GAMBAR_1_DARI_BOT" alt="panel-1">
        <img class="comic-panel" src="LINK_GAMBAR_2_DARI_BOT" alt="panel-2">
        
        <div id="watermark-layer"></div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.setHeaderColor('#000000');
        
        // 1. Script Ekstra Anti-Screenshot (Auto Blur)
        window.addEventListener('blur', function() {
            document.body.style.filter = "blur(20px)";
        });
        window.addEventListener('focus', function() {
            document.body.style.filter = "none";
        });

        // 2. Script Dynamic Watermark
        // Mengambil data pengguna dari Telegram
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        // Memastikan yang dicetak adalah username
        const readerName = user ? (user.username || user.first_name) : "Pembaca_MVP";

        const wmLayer = document.getElementById('watermark-layer');
        
        // Melipatgandakan teks watermark agar menutupi seluruh panjang komik
        for (let i = 0; i < 50; i++) {
            let wmElement = document.createElement('div');
            wmElement.className = 'wm-text';
            wmElement.innerText = "@" + readerName;
            wmLayer.appendChild(wmElement);
        }
    </script>
</body>
</html>
