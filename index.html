<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        .comic-container { display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; position: relative; }
        .comic-panel { width: 100%; display: block; pointer-events: none; }
        .title-bar { background: #111; color: gold; text-align: center; padding: 15px; font-family: sans-serif; font-weight: bold; border-bottom: 2px solid #333; }
        
        /* Tampilan Error Jika Dibuka di PC */
        .error-screen { color: white; text-align: center; padding: 50px 20px; font-family: sans-serif; }
        .error-screen h2 { color: #ff4444; }
    </style>
</head>
<body oncontextmenu="return false;">
    
    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.setHeaderColor('#000000');
        window.Telegram.WebApp.expand();

        // ==========================================
        // 1. SATPAM PLATFORM (HANYA IZINKAN HP)
        // ==========================================
        const platform = window.Telegram.WebApp.platform;
        
        if (platform !== 'android' && platform !== 'ios') {
            document.body.innerHTML = `
                <div class="error-screen">
                    <h2>🛑 AKSES DITOLAK</h2>
                    <p>Demi kenyamanan dan keamanan, komik ini <b>hanya bisa dibaca melalui aplikasi Telegram di HP</b> (Android / iOS).</p>
                    <p>Silakan buka kembali tautan baca ini lewat HP kamu ya!</p>
                </div>
            `;
            throw new Error("Akses PC Diblokir."); 
        }

        // ==========================================
        // 2. RENDER HALAMAN KOMIK
        // ==========================================
        document.body.innerHTML = `
            <div class="title-bar" id="manga-title">Memuat Chapter...</div>
            <div class="comic-container" id="reader">
                <div id="watermark-layer"></div>
            </div>
        `;

        const user = window.Telegram.WebApp.initDataUnsafe.user;
        
        // ==========================================
        // 3. WATERMARK 3 BARIS (ANTI-CEPU)
        // ==========================================
        const username = (user && user.username) ? "@" + user.username : "@TanpaUsername";
        const namaTele = (user && user.first_name) ? user.first_name : "Member";
        const customText = "MVP\n" + username + " " + namaTele + "\nDO NOT REPOST";

        const wmLayer = document.getElementById('watermark-layer');
        wmLayer.style.position = 'absolute';
        wmLayer.style.top = '0';
        wmLayer.style.left = '0';
        wmLayer.style.width = '100%';
        wmLayer.style.height = '100%';
        wmLayer.style.pointerEvents = 'none';
        wmLayer.style.overflow = 'hidden';

        const wmColors = ['#ffffff', '#cccccc', '#999999', '#e6d7a1'];

        for (let i = 0; i < 100; i++) {
            let wmElement = document.createElement('div');
            wmElement.innerText = customText; 
            
            let topPos = Math.random() * 100; 
            let leftPos = Math.random() * 100;
            let rot = Math.random() * 120 - 60; 
            let opac = (Math.random() * 0.17 + 0.08).toFixed(2); 
            let fontSize = Math.floor(Math.random() * 10) + 14; 
            let randomColor = wmColors[Math.floor(Math.random() * wmColors.length)];

            wmElement.style.position = 'absolute';
            wmElement.style.top = topPos + '%';
            wmElement.style.left = leftPos + '%';
            wmElement.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
            wmElement.style.opacity = opac;
            wmElement.style.fontSize = fontSize + 'px';
            wmElement.style.color = randomColor;
            wmElement.style.fontWeight = 'bold';
            wmElement.style.textShadow = '1px 1px 3px rgba(0,0,0,0.8)';
            wmElement.style.whiteSpace = 'pre-wrap'; 
            wmElement.style.textAlign = 'center'; 
            wmElement.style.zIndex = '10';
            
            wmLayer.appendChild(wmElement);
        }

        // ==========================================
        // 4. MEMUAT GAMBAR DARI BOT
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const readerDiv = document.getElementById('reader');
        const titleBar = document.getElementById('manga-title');
        
        if(urlParams.has('title')) {
            titleBar.innerText = urlParams.get('title').replace(/_/g, ' ').toUpperCase();
        }

        for (let [key, value] of urlParams.entries()) {
            if (key.startsWith('img')) {
                let imgElement = document.createElement('img');
                imgElement.className = 'comic-panel';
                imgElement.src = value; 
                readerDiv.insertBefore(imgElement, wmLayer);
            }
        }
    </script>
</body>
</html>
