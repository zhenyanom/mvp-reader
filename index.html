<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP VIP Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        .comic-container { display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; position: relative; }
        .comic-panel { width: 100%; display: block; pointer-events: none; }
        #watermark-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-wrap: wrap; align-content: flex-start; overflow: hidden; opacity: 0.15; }
        .wm-text { color: white; font-size: 24px; font-weight: bold; margin: 40px; transform: rotate(-30deg); text-shadow: 2px 2px 4px #000; }
        .title-bar { background: #111; color: gold; text-align: center; padding: 15px; font-family: sans-serif; font-weight: bold; border-bottom: 2px solid #333; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="title-bar" id="manga-title">Memuat Chapter...</div>
    <div class="comic-container" id="reader">
        <div id="watermark-layer"></div>
    </div>
    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.setHeaderColor('#000000');
        window.Telegram.WebApp.expand();
        
        window.addEventListener('blur', function() { document.body.style.filter = "blur(20px)"; });
        window.addEventListener('focus', function() { document.body.style.filter = "none"; });

        const user = window.Telegram.WebApp.initDataUnsafe.user;
        const readerName = user ? (user.username || user.first_name) : "Pembaca_VIP";
        const wmLayer = document.getElementById('watermark-layer');
        
        for (let i = 0; i < 50; i++) {
            let wmElement = document.createElement('div');
            wmElement.className = 'wm-text';
            wmElement.innerText = "@" + readerName;
            wmLayer.appendChild(wmElement);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const readerDiv = document.getElementById('reader');
        const titleBar = document.getElementById('manga-title');
        
        if(urlParams.has('title')) {
            titleBar.innerText = urlParams.get('title').replace(/_/g, ' ').toUpperCase();
        }

        for (let [key, value] of urlParams.entries()) {
            if (key.startsWith('img')) {
                let imgElement = document.createElement('img');
                imgElement.className = 'comic-panel';
                imgElement.src = value; 
                readerDiv.insertBefore(imgElement, wmLayer);
            }
        }
    </script>
</body>
</html>
