<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVP Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Kontainer Komik */
        #comic-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
        }
        
        #comic-container img {
            width: 100%;
            max-width: 800px;
            display: block;
            pointer-events: none; /* Anti drag/save gambar */
        }

        /* Layar Satpam / Error Screen */
        #error-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #aa0000;
            color: #ffffff;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 99999;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Watermark Baru: 1 Titik, Rata Kiri, Pojok Kiri Bawah, Melayang (Fixed) */
        #watermark {
            position: fixed;
            bottom: 20px;
            left: 20px;
            text-align: left; /* Rata Kiri */
            font-weight: bold;
            font-size: 14px;
            line-height: 1.3;
            white-space: pre-wrap;
            color: rgba(255, 255, 255, 0.4); /* Opacity diturunkan agar tembus pandang */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); /* Outline agar terbaca di area terang */
            pointer-events: none; /* Melayang dan tidak mengganggu sentuhan */
            z-index: 9999;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="error-screen">
        <h1>🛑 AKSES DITOLAK</h1>
        <p id="error-text">Keamanan Ekosistem MVP aktif.<br>Komik ini HANYA BISA DIBACA melalui Aplikasi Telegram Resmi di Smartphone.</p>
    </div>

    <div id="main-content">
        <div id="watermark"></div>
        <div id="comic-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. Deteksi Platform & Parameter URL
        const platform = tg.platform;
        const urlParams = new URLSearchParams(window.location.search);
        const isAndroidOnly = urlParams.get('android_only') === 'true';

        // 2. Logika Satpam (Memblokir PC/Web & Fitur Decensored iOS)
        const allowedPlatforms = ['android', 'android_x', 'ios'];
        let isBlocked = false;

        if (!allowedPlatforms.includes(platform)) {
            // Blokir mutlak PC / Web
            isBlocked = true;
        } else if (isAndroidOnly && platform === 'ios') {
            // Blokir khusus iOS jika chapter di-set android_only
            isBlocked = true;
            document.getElementById('error-text').innerHTML = "Untuk chapter Decensored ini, akses HANYA diizinkan melalui perangkat Android demi keamanan.";
        }

        // 3. Eksekusi Tampilan
        if (isBlocked) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
        } else {
            // SET JUDUL JIKA ADA
            if(urlParams.has('title')) {
                document.title = urlParams.get('title').replace(/_/g, ' ');
            }

            // 4. RENDER GAMBAR (Menggunakan skrip andalanmu yang terbukti jalan)
            const container = document.getElementById('comic-container');
            urlParams.forEach((value, key) => {
                if (key.startsWith('img')) {
                    const imgElement = document.createElement('img');
                    imgElement.src = value;
                    imgElement.loading = "lazy";
                    container.appendChild(imgElement);
                }
            });

            // 5. RENDER WATERMARK (Format Mahkota, Satu Titik di Pojok)
            const user = tg.initDataUnsafe?.user;
            const usn = user?.username ? `@${user.username}` : 'NoUsername';
            const userId = user?.id || 'UnknownID';
            
            const watermarkText = `👑 MVP\n${usn} (${userId})\nFree | DO NOT REPOST`;
            document.getElementById('watermark').innerText = watermarkText;
        }
    </script>
</body>
</html>
