<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVP Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Latar gelap */
            color: #fff;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        /* Kontainer Komik (Lapis 1 Keamanan) */
        .comic-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            pointer-events: none; /* Membuat gambar kebal sentuhan/drag */
        }
        
        .comic-container img {
            width: 100%;
            display: block;
        }

        /* Watermark Baru (Satu titik, melayang, rata kiri) */
        #watermark {
            position: fixed;
            bottom: 15px;
            left: 15px;
            text-align: left;
            font-family: Arial, sans-serif;
            font-size: 13px; /* Ukuran pas agar tidak mengganggu */
            color: rgba(255, 255, 255, 0.35); /* Transparansi (Opacity) */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); /* Outline hitam tipis agar terbaca di gambar terang */
            white-space: pre-wrap;
            pointer-events: none; /* Melayang dan tembus jari */
            z-index: 9999;
        }

        /* Layar Satpam (Blocker) */
        #blocker {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #aa0000; /* Merah gelap */
            color: white;
            text-align: center;
            padding-top: 50%;
            font-size: 20px;
            font-family: Arial, sans-serif;
            z-index: 10000;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="blocker">🛑 AKSES DITOLAK<br><br>Demi keamanan konten MVP, silakan akses chapter ini melalui aplikasi Telegram di HP Android.</div>
    
    <div id="watermark"></div>
    
    <div class="comic-container" id="comic-layer">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. Deteksi Perangkat & Parameter URL
        const platform = tg.platform;
        const urlParams = new URLSearchParams(window.location.search);
        const isAndroidOnly = urlParams.get('android_only') === 'true';

        // 2. Logika Satpam Platform
        const allowedPlatforms = ['android', 'android_x', 'ios'];
        let isBlocked = false;

        if (!allowedPlatforms.includes(platform)) {
            // Blokir mutlak untuk PC (Windows/Mac) dan Web Browser
            isBlocked = true; 
        } else if (isAndroidOnly && platform === 'ios') {
            // Blokir khusus iPhone/iOS jika mode android_only menyala
            isBlocked = true; 
        }

        // 3. Eksekusi Tampilan Layar
        if (isBlocked) {
            document.getElementById('blocker').style.display = 'block';
            document.getElementById('comic-layer').style.display = 'none';
        } else {
            // 4. Eksekusi Watermark Tunggal
            const user = tg.initDataUnsafe?.user;
            const username = user?.username ? `@${user.username}` : "No_Username";
            const userId = user?.id ? user.id : "ID_Unknown";

            // Merakit teks 3 baris sesuai permintaanmu
            const wmText = `👑 MVP\n${username} (${userId})\nFree | DO NOT REPOST`;
            document.getElementById('watermark').innerText = wmText;
        }
    </script>
</body>
</html>
